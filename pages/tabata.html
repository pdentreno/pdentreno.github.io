<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PD Timer</title>

  <link rel="stylesheet" href="../styles/common.css">
  <link rel="stylesheet" href="../styles/tabata.css">
</head>

<body>

  <!-- Volver -->
  <a class="back-button" href="../index.html">← Volver</a>

  <!-- Header -->
  <div class="top-center-text">TABATA / EMOM</div>

  <!-- Fullscreen -->
  <button class="fullscreen-button" id="fullscreenBtn">⛶</button>

  <main class="container">

    <!-- =========================
         FORMULARIO
    ========================== -->
    <div class="form">

      <div class="row">
        <span class="label">WORK</span>
        <input type="number" id="workInput" min="1" placeholder="0">
        <span class="suffix">seconds</span>
      </div>

      <div class="row">
        <span class="label">REST</span>
        <input type="number" id="restInput" min="0" placeholder="0">
        <span class="suffix">seconds</span>
      </div>

      <div class="row">
        <span class="label">ROUNDS</span>
        <input type="number" id="roundsInput" min="1" placeholder="0">
        <span class="suffix"></span>
      </div>

      <div class="row">
        <span class="label">SETS</span>
        <input type="number" id="setsInput" min="1" placeholder="0">
        <span class="suffix"></span>
      </div>

      <div class="row">
        <span class="label">REST SETS</span>
        <input type="number" id="restSetsInput" min="0" placeholder="0">
        <span class="suffix">seconds</span>
      </div>

      <button class="start-button">START</button>

      <div class="error-message" id="errorMessage"></div>

    </div>

    <!-- =========================
         TIMER SCREEN
    ========================== -->
    <div id="timerScreen" class="hidden">

      <div id="timeDisplay">00:00:00</div>
      <div id="phaseDisplay"></div>

    </div>

  </main>

  <script src="../scripts/common.js"></script>
  <script src="../scripts/tabata.js"></script>

</body>

</html>
